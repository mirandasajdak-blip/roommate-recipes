<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roommate Recipes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg:#faf6ee; --card-bg:#fff; --line:#e5dec9; --ink:#2b261f; --ink-soft:#70675b; --mustard:#f1ebd9; --danger:#b03a2e; --primary:#8a6f44; --primary-hover:#735c36; }
body { background-color:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin:0; padding:20px; line-height:1.5; }
#dd-root { max-width:1000px; margin:0 auto; }
.dd-header { display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--line); padding-bottom:16px; margin-bottom:16px; flex-wrap:wrap; gap:16px; }
.dd-header h1 { margin:0 0 4px 0; font-size:24px; }
.dd-header .sub { color:var(--ink-soft); font-size:14px; }
.dd-tabs { display:flex; gap:8px; flex-wrap:wrap; }
.dd-tab { padding:8px 16px; background:var(--card-bg); border:1px solid var(--line); border-radius:6px; cursor:pointer; font-size:14px; }
.dd-tab.active { background:var(--primary); border-color:var(--primary); color:#fff; }
.dd-shared-note { font-size:12px; color:var(--ink-soft); flex:1; min-width:250px; }
.dd-toolbar { display:flex; gap:12px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
.dd-search { flex:1; min-width:200px; background:var(--card-bg); border:1px solid var(--line); color:var(--ink); padding:8px 12px; border-radius:6px; font-size:14px; }
.dd-btn { background:var(--primary); color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:14px; font-weight:500; }
.dd-btn:hover { background:var(--primary-hover); }
.dd-btn.secondary { background:var(--card-bg); color:var(--ink); border:1px solid var(--line); }
.dd-btn.secondary:hover { background:var(--mustard); }
.dd-btn.danger { background:transparent; color:var(--danger); border:1px solid var(--danger); }
.dd-chip { background:var(--card-bg); border:1px solid var(--line); padding:4px 12px; border-radius:20px; font-size:12px; cursor:pointer; }
.dd-chip.on { background:var(--primary); border-color:var(--primary); color:#fff; font-weight:600; }
.dd-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-top:16px; }
.dd-card { background:var(--card-bg); border:1px solid var(--line); border-radius:8px; padding:16px; position:relative; cursor:pointer; }
.dd-card h3 { margin:0 0 8px 0; font-size:18px; padding-right:30px; }
.dd-check { position:absolute; top:16px; right:16px; width:22px; height:22px; border:1px solid var(--line); border-radius:4px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; background:var(--card-bg); }
.dd-check.on { background:var(--primary); border-color:var(--primary); color:#fff; }
.meta { display:flex; gap:6px; flex-wrap:wrap; font-size:12px; color:var(--ink-soft); margin-bottom:12px; }
.dd-tag { background:var(--mustard); padding:2px 6px; border-radius:4px; color:var(--ink); }
.dd-badge-try { background:#f5eccd; color:#614d0b; }
.dd-badge-warn { background:#f9dcd9; color:#611b15; }
.dd-badge-leftover { background:#dfeee0; color:#2f5233; }
.ingr-preview { font-size:13px; color:var(--ink-soft); border-top:1px solid var(--line); padding-top:8px; }
.dd-empty { text-align:center; padding:40px; color:var(--ink-soft); border:1px dashed var(--line); border-radius:8px; grid-column:1/-1; }
.dd-empty .display { font-size:18px; color:var(--ink); margin-bottom:8px; }
.dd-modal-back { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.dd-modal { background:var(--bg); border:1px solid var(--line); border-radius:12px; max-width:640px; width:100%; max-height:90vh; overflow-y:auto; padding:24px; position:relative; }
.dd-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--ink-soft); font-size:24px; cursor:pointer; }
.dd-field { margin-bottom:16px; }
.dd-field label { display:block; font-size:12px; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px; font-weight:600; }
.dd-field input, .dd-field select, .dd-field textarea { width:100%; background:var(--card-bg); border:1px solid var(--line); color:var(--ink); padding:8px 12px; border-radius:6px; box-sizing:border-box; }
.dd-row2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.dd-row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.dd-ingr-row { display:grid; grid-template-columns:60px 100px 1fr 120px 40px; gap:8px; margin-bottom:8px; }
.dd-ingr-row input, .dd-ingr-row select { background:var(--card-bg); border:1px solid var(--line); color:var(--ink); padding:4px 8px; border-radius:6px; }
.dd-modal-actions { display:flex; gap:12px; margin-top:24px; border-top:1px solid var(--line); padding-top:16px; flex-wrap:wrap; }
.dd-help { font-size:12px; color:var(--ink-soft); }
.dd-week-slots { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
.dd-slot { background:var(--card-bg); border:1px solid var(--line); border-radius:8px; padding:16px; min-height:120px; display:flex; flex-direction:column; }
.dd-slot.filled { border-left:4px solid var(--primary); }
.dd-slot .num { font-size:11px; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px; }
.dd-slot h4 { margin:0 0 6px 0; font-size:16px; }
.dd-slot .empty-msg { color:var(--ink-soft); font-size:13px; margin:auto 0; }
.dd-slot-actions { display:flex; gap:8px; margin-top:auto; padding-top:12px; }
.dd-slot-actions .dd-btn { padding:4px 8px; font-size:11px; flex:1; }
.dd-shared-panel { background:var(--mustard); border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:24px; }
.dd-shared-item { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:14px; }
.dd-dot { width:8px; height:8px; border-radius:50%; }
.dd-shared-none { color:var(--ink-soft); font-size:13px; }
.dd-glist-cat { margin-bottom:24px; }
.dd-glist-cat h3 { border-bottom:1px solid var(--line); padding-bottom:8px; margin-bottom:12px; font-size:16px; }
.dd-glist-item { display:flex; align-items:flex-start; gap:12px; padding:8px 0; font-size:14px; }
.dd-glist-item.checked { color:var(--ink-soft); text-decoration:line-through; }
.dd-glist-check { width:18px; height:18px; border:1px solid var(--line); border-radius:4px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:10px; background:var(--card-bg); flex-shrink:0; }
.dd-glist-check.on { background:var(--primary); border-color:var(--primary); color:#fff; }
.dd-glist-item .amt { font-weight:600; margin-right:6px; }
.dd-glist-item .from { font-size:12px; color:var(--ink-soft); margin-left:8px; }
.dd-warn-banner { background:#f9dcd9; border:1px solid var(--line); color:var(--danger); padding:12px; border-radius:6px; margin-bottom:16px; font-size:13px; }
.dd-select-inline { background:var(--card-bg); border:1px solid var(--line); color:var(--ink); padding:6px 12px; border-radius:6px; font-size:13px; }
.dd-autosave-note { font-size:11px; color:var(--ink-soft); margin-top:-8px; margin-bottom:16px; min-height:14px; }
/* Shopping mode */
.shop-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.shop-header h1 { margin:0; font-size:22px; }
.shop-add-row { display:flex; gap:8px; margin-bottom:20px; }
.shop-add-row input { flex:1; font-size:16px; padding:14px; border:1px solid var(--line); border-radius:8px; }
.shop-list { display:flex; flex-direction:column; gap:10px; }
.shop-row { display:flex; align-items:center; gap:16px; padding:18px 16px; background:var(--card-bg); border:1px solid var(--line); border-radius:10px; cursor:pointer; font-size:17px; }
.shop-row.checked { background:#f2ede1; color:var(--ink-soft); text-decoration:line-through; }
.shop-row .shop-box { width:28px; height:28px; border:2px solid var(--primary); border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; }
.shop-row.checked .shop-box { background:var(--primary); }
.shop-row .shop-from { font-size:12px; color:var(--ink-soft); margin-left:auto; padding-left:8px; }

@media (max-width: 640px) {
  body { padding:12px; }
  .dd-header h1 { font-size:20px; }
  .dd-tabs { width:100%; }
  .dd-tab { flex:1; text-align:center; padding:8px 6px; font-size:13px; }
  .dd-row2, .dd-row3 { grid-template-columns:1fr; gap:10px; }
  .dd-modal { padding:16px; max-height:94vh; }
  .dd-ingr-row { grid-template-columns:1fr 1fr; grid-template-areas:"amt unit" "name name" "cat remove"; gap:6px; }
  .dd-ingr-row input[data-field="amount"] { grid-area:amt; }
  .dd-ingr-row select[data-field="unit"] { grid-area:unit; }
  .dd-ingr-row input[data-field="name"] { grid-area:name; }
  .dd-ingr-row select[data-field="category"] { grid-area:cat; }
  .dd-ingr-row button[data-remove] { grid-area:remove; justify-self:end; }
  .dd-grid { grid-template-columns:1fr; }
  .dd-week-slots { grid-template-columns:1fr 1fr; }
  .dd-toolbar { gap:8px; }
  .dd-search { min-width:0; }
  .shop-row { padding:16px 14px; font-size:16px; }
  .shop-add-row input { font-size:16px; }
}
</style>
</head>

    {name:"Cottage Pie (Shepherd's Pie with Beef)", protein:"Beef", cuisine:"British", servings:3, bucket:"tryList", ingredients:[], notes:""}
  ];

  function uid(){ return 'r' + Math.random().toString(36).slice(2,10); }

  function freshSeed(){
    return SEED.map(r => ({
      ...r, id: uid(), bucket: r.bucket || 'rotation',
      surpriseEligible: r.surpriseEligible !== undefined ? r.surpriseEligible : true,
      prepMinutes: null, cookMinutes: null,
      makesLeftovers: (r.servings || 0) > 4,
      ingredients: r.ingredients || []
    }));
  }

  function repairRecipe(r){
    if(!r) return r;
    if(!r.ingredients || !Array.isArray(r.ingredients)) r.ingredients = [];
    r.name = r.name || "Unnamed Recipe";
    r.protein = r.protein || "Other";
    r.bucket = r.bucket || "rotation";
    if(r.surpriseEligible === undefined) r.surpriseEligible = true;
    if(r.makesLeftovers === undefined) r.makesLeftovers = (r.servings||0) > 4;
    if(r.prepMinutes === undefined) r.prepMinutes = null;
    if(r.cookMinutes === undefined) r.cookMinutes = null;
    return r;
  }

  async function saveRecipeRow(recipe){
    const { error } = await supabase.from('recipes').upsert({ id: recipe.id, data: recipe, updated_at: new Date().toISOString() });
    if(error) console.error("Failed to save recipe:", error);
    return !error;
  }
  async function deleteRecipeRow(id){
    const { error } = await supabase.from('recipes').delete().eq('id', id);
    if(error) console.error("Failed to delete recipe:", error);
  }
  async function saveMeta(){
    const payload = {
      id: 1, this_week: state.thisWeek, checked_grocery: state.checkedGrocery,
      extra_grocery: state.extraGrocery, try_chance: state.tryChance, week_size: state.weekSize,
      updated_at: new Date().toISOString()
    };
    const { error } = await supabase.from('app_meta').upsert(payload);
    if(error) console.error("Failed to save meta:", error);
  }

  async function loadState(){
    state.loadError = false; state.loadErrorDetail = null; state.loadErrorCode = null;
    try {
      const { data: recipeRows, error: recErr } = await supabase.from('recipes').select('id, data');
      if(recErr) throw recErr;
      if(!recipeRows || recipeRows.length === 0){
        const seeded = freshSeed();
        const rows = seeded.map(r => ({ id: r.id, data: r }));
        const { error: insErr } = await supabase.from('recipes').insert(rows);
        if(insErr) throw insErr;
        state.recipes = seeded;
      } else {
        state.recipes = recipeRows.map(row => repairRecipe(row.data));
      }
      const { data: metaRow, error: metaErr } = await supabase.from('app_meta').select('*').eq('id', 1).maybeSingle();
      if(metaErr) throw metaErr;
      if(!metaRow){
        state.thisWeek = []; state.checkedGrocery = {}; state.extraGrocery = []; state.tryChance = 0.3; state.weekSize = 5;
        await saveMeta();
      } else {
        state.thisWeek = metaRow.this_week || [];
        state.checkedGrocery = metaRow.checked_grocery || {};
        state.extraGrocery = metaRow.extra_grocery || [];
        state.tryChance = metaRow.try_chance !== undefined && metaRow.try_chance !== null ? metaRow.try_chance : 0.3;
        state.weekSize = metaRow.week_size || 5;
      }
    } catch(err){
      console.error("Database loading failed:", err);
      state.loadError = true;
      state.loadErrorDetail = (err && (err.message || err.error_description || err.hint || err.details)) || JSON.stringify(err) || String(err);
      state.loadErrorCode = err && err.code ? err.code : null;
    }
    state.loaded = true;
    render();
  }

  function esc(s){ return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function getRecipe(id){ return state.recipes.find(r => r.id === id); }

  function guessCategory(name){
    for(const [re, cat] of CATEGORY_HINTS){ if(re.test(name)) return cat; }
    return "Other";
  }

  function parseIngredientBlock(text){
    if(!text || !text.trim()) return [];
    let lines = text.split(/\n+/).map(l => l.trim()).filter(Boolean);
    if(lines.length === 1 && lines[0].includes(',')){
      lines = lines[0].split(',').map(l => l.trim()).filter(Boolean);
    }
    const qtyRe = /^(\d+\s+\d+\/\d+|\d+\/\d+|\d+(?:\.\d+)?)\s*/;
    const results = [];
    for(const line of lines){
      let rest = line;
      let amount = '';
      const qm = rest.match(qtyRe);
      if(qm){ amount = qm[1]; rest = rest.slice(qm[0].length).trim(); }
      let unit = 'count';
      const words = rest.split(/\s+/);
      if(words.length){
        const first = words[0].toLowerCase().replace(/\.$/, '');
        if(UNIT_SYNONYMS[first]){ unit = UNIT_SYNONYMS[first]; rest = words.slice(1).join(' '); }
      }
      const name = rest.trim().toLowerCase();
      if(!name) continue;
      results.push({ name, amount, unit, category: guessCategory(name) });
    }
    return results;
  }

  function filteredRecipes(){
    let list = state.recipes;
    if(state.bucketFilter){ list = list.filter(r => (r.bucket||'rotation') === state.bucketFilter); }
    if(state.proteinFilter){ list = list.filter(r => r.protein === state.proteinFilter); }
    if(state.search.trim()){
      const q = state.search.trim().toLowerCase();
      list = list.filter(r => (r.name||'').toLowerCase().includes(q) || (r.cuisine||'').toLowerCase().includes(q) || (r.ingredients||[]).some(i => i.name && i.name.toLowerCase().includes(q)));
    }
    return list.slice().sort((a,b)=> (a.name||'').localeCompare(b.name||''));
  }

      const slotsNeeded = r.makesLeftovers ? 2 : 1;
      const free = state.weekSize - state.thisWeek.length;

          ? `"${r.name}" makes leftovers and needs 2 open slots, but you only have ${free} free. Remove something first.`
          : `You've already got ${state.weekSize} recipe${state.weekSize===1?'':'s'} planned for this week. Remove one first.`);

  function findSharedIngredients(recipeIds){
    const map = {};
    recipeIds.forEach(id => {
      const r = getRecipe(id);
      if(!r) return;
      (r.ingredients||[]).forEach(ing => {
        if(!ing || !ing.name) return;
        const name = ing.name.toLowerCase();
        if(!map[name]) map[name] = [];
        map[name].push({recipeId:id, recipeName:r.name, amount:ing.amount, unit:ing.unit});
      });
    });
    return Object.entries(map).filter(([name,uses]) => new Set(uses.map(u=>u.recipeId)).size > 1);
  }

  function parseFraction(str){
    if(!str) return 0;
    str = String(str).trim();
    if(str.includes('/')){
      const parts = str.split('/');
      if(parts.length===2){ const n=parseFloat(parts[0]), d=parseFloat(parts[1]); if(!isNaN(n)&&!isNaN(d)&&d!==0) return n/d; }
    }
    const p = parseFloat(str);
    return isNaN(p) ? 0 : p;
  }

  function formatAmount(num){
    if(num===0) return '';
    if(num%1===0) return String(num);
    const r = Math.round(num*100)/100;
    if(r===0.5) return '1/2'; if(r===0.25) return '1/4'; if(r===0.75) return '3/4';
    if(r===0.33) return '1/3'; if(r===0.66||r===0.67) return '2/3';
    return String(r);
  }

  function uniqueWeekIds(){ return Array.from(new Set(state.thisWeek)); }

  function suggestWeek(){
    const pool = state.recipes.filter(r => (r.bucket||'rotation')==='rotation');
    const tryPool = state.recipes.filter(r => r.bucket==='tryList' && r.surpriseEligible!==false);
    if(pool.length===0 && tryPool.length===0) return [];
    const shuffled = pool.slice().sort(()=>Math.random()-0.5);
    const usedProteins = {};
    let picked = [];
    let slotsUsed = 0;
    let leftoversPicked = 0;

    function tryAdd(r, opts){
      opts = opts || {};
      const cost = r.makesLeftovers ? 2 : 1;
      if(slotsUsed + cost > state.weekSize) return false;
      if(picked.includes(r.id)) return false;
      if(!opts.ignoreProtein && (usedProteins[r.protein]||0) >= 2) return false;
      if(!opts.allowSecondLeftover && r.makesLeftovers && leftoversPicked >= 1) return false;
      for(let i=0;i<cost;i++) picked.push(r.id);
      usedProteins[r.protein] = (usedProteins[r.protein]||0) + 1;
      slotsUsed += cost;
      if(r.makesLeftovers) leftoversPicked++;
      return true;
    }

    for(const r of shuffled){ if(slotsUsed >= state.weekSize) break; tryAdd(r); }
    for(const r of shuffled){ if(slotsUsed >= state.weekSize) break; tryAdd(r, {ignoreProtein:true}); }

    if(tryPool.length && Math.random() < state.tryChance && picked.length){
      const idx = Math.floor(Math.random()*picked.length);
      const tryPick = tryPool[Math.floor(Math.random()*tryPool.length)];
      picked[idx] = tryPick.id;
    }
    return picked.slice(0, state.weekSize);
  }

  function guidedSuggestWeek(proteinCounts, maxTime, maxLeftovers){
    const pool = state.recipes.filter(r => {
      const ok = (r.bucket||'rotation')==='rotation' || (r.bucket==='tryList' && r.surpriseEligible!==false);
      if(!ok) return false;
      if(maxTime){ const total=(r.prepMinutes||0)+(r.cookMinutes||0); if(!total || total>maxTime) return false; }
      return true;
    });
    const leftoverCap = maxLeftovers === undefined || maxLeftovers === null ? Infinity : maxLeftovers;
    let picked = []; let slotsUsed = 0; let leftoversUsed = 0; const usedIds = new Set(); const shortfalls = [];
    Object.entries(proteinCounts).forEach(([protein, count]) => {
      if(!count) return;
      let need = count;
      const options = pool.filter(r => r.protein===protein && !usedIds.has(r.id)).sort(()=>Math.random()-0.5);
      let found = 0;
      for(const r of options){
        if(need <= 0) break;
        const cost = r.makesLeftovers ? 2 : 1;
        if(slotsUsed + cost > state.weekSize) continue;
        if(r.makesLeftovers && leftoversUsed >= leftoverCap) continue;
        for(let i=0;i<cost;i++) picked.push(r.id);
        usedIds.add(r.id); slotsUsed += cost; need -= cost; found++;
        if(r.makesLeftovers) leftoversUsed++;
      }
      if(need > 0) shortfalls.push({protein, count, found});
    });
    const remaining = pool.filter(r => !usedIds.has(r.id)).sort(()=>Math.random()-0.5);
    for(const r of remaining){
      if(slotsUsed >= state.weekSize) break;
      const cost = r.makesLeftovers ? 2 : 1;
      if(slotsUsed + cost > state.weekSize) continue;
      if(r.makesLeftovers && leftoversUsed >= leftoverCap) continue;
      for(let i=0;i<cost;i++) picked.push(r.id);
      usedIds.add(r.id); slotsUsed += cost;
      if(r.makesLeftovers) leftoversUsed++;
    }
    return { picked: picked.slice(0, state.weekSize), shortfalls };
  }

  function renderWeek(body){
    const shared = findSharedIngredients(uniqueWeekIds());
    const colors = ['#8a6f44','#b03a2e','#2b261f','#4a5d4e','#7851a9'];
    body.innerHTML = `
      <div class="dd-toolbar">
        <button class="dd-btn" id="dd-suggest">Suggest my week</button>
        <button class="dd-btn secondary" id="dd-guided">Guided suggest…</button>
        <button class="dd-btn secondary" id="dd-clear-week" ${state.thisWeek.length===0?'disabled':''}>Clear week</button>
        <select class="dd-select-inline" id="dd-try-chance">
          ${TRY_CHANCE_OPTIONS.map(o => `<option value="${o.value}" ${o.value===state.tryChance?'selected':''}>${o.label}</option>`).join('')}
        </select>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);">
          Nights this week:
          <input type="number" id="dd-week-size" min="1" max="10" value="${state.weekSize}" style="width:52px;padding:5px 6px;border:1px solid var(--line);border-radius:6px;font-size:13px;"/>
        </label>
        <div style="flex:1;"></div>
        <span class="dd-help">${state.thisWeek.length}/${state.weekSize} slots filled</span>
      </div>
      <div class="dd-week-slots" id="dd-slots"></div>
      <div class="dd-shared-panel">
        <h3>Shared ingredients this week</h3>
        ${shared.length ? shared.map(([name,uses],i) => `
          <div class="dd-shared-item">
            <span class="dd-dot" style="background:${colors[i%colors.length]}"></span>
            <span><strong>${esc(name)}</strong> — used in ${uses.map(u=>esc(u.recipeName)).join(' & ')}. Consider buying in bulk.</span>
          </div>
        `).join('') : `<div class="dd-shared-none">No overlapping ingredients yet.</div>`}
      </div>
      <div class="dd-help">Tip: leftover recipes fill 2 slots automatically. Click a recipe's checkbox in the Recipe Box, or use "Suggest my week".</div>
      <h3 style="margin-top:32px;border-top:1px solid var(--line);padding-top:24px;">Your Recipe Box</h3>
      <div id="dd-inline-recipes"></div>
    `;
    const slotsEl = document.getElementById('dd-slots');
    slotsEl.innerHTML = Array.from({length:state.weekSize}).map((_, i) => {
      const id = state.thisWeek[i];
      const r = id ? getRecipe(id) : null;
      if(!r) return `<div class="dd-slot dd-slot-empty" data-empty-idx="${i}" style="cursor:pointer;"><div class="num">Slot ${i+1}</div><div class="empty-msg">Empty — tap to add a recipe</div></div>`;
      const isTry = r.bucket === 'tryList';
      const noIngr = !r.ingredients || r.ingredients.length===0;
      const isPairStart = r.makesLeftovers && state.thisWeek[i+1] === id;
      const isPairEnd = r.makesLeftovers && state.thisWeek[i-1] === id;
      return `
        <div class="dd-slot filled">
          <div class="num">Slot ${i+1} · ${esc(r.protein)}${isTry?' · <span style="color:#614d0b;background:#f5eccd;padding:1px 4px;border-radius:3px;">want to try</span>':''}${(isPairStart||isPairEnd)?' · <span style="color:#2f5233;background:#dfeee0;padding:1px 4px;border-radius:3px;">leftovers</span>':''}</div>
          <h4>${esc(r.name)}</h4>
          <div class="meta">${r.cuisine?esc(r.cuisine)+' · ':''}${r.servings||'–'} servings${noIngr?' · <span style="color:var(--danger);">needs ingredients</span>':''}</div>
          <div class="dd-slot-actions">
            <button class="dd-btn secondary" data-swap-idx="${i}">Swap</button>
            <button class="dd-btn secondary" data-remove-idx="${i}">Remove</button>
          </div>
        </div>
      `;
    }).join('');
    slotsEl.querySelectorAll('[data-remove-idx]').forEach(el => el.addEventListener('click', async () => {
      const i = +el.dataset.removeIdx;
      const id = state.thisWeek[i];
      const r = getRecipe(id);
      if(r && r.makesLeftovers){ state.thisWeek = state.thisWeek.filter(x => x !== id); }
      else { state.thisWeek.splice(i,1); }
      await saveMeta(); renderWeek(body);
    }));
    slotsEl.querySelectorAll('[data-swap-idx]').forEach(el => el.addEventListener('click', () => { openSwapPicker(+el.dataset.swapIdx, body); }));
    slotsEl.querySelectorAll('[data-empty-idx]').forEach(el => el.addEventListener('click', () => { openFillPicker(+el.dataset.emptyIdx, body); }));
    document.getElementById('dd-suggest').addEventListener('click', async () => { state.thisWeek = suggestWeek(); await saveMeta(); renderWeek(body); });
    document.getElementById('dd-guided').addEventListener('click', () => openGuidedModal(body));
    document.getElementById('dd-try-chance').addEventListener('change', async e => { state.tryChance = parseFloat(e.target.value); await saveMeta(); });
    document.getElementById('dd-week-size').addEventListener('change', async e => {
      let val = parseInt(e.target.value) || 5;
      val = Math.max(1, Math.min(10, val));
      e.target.value = val;
      state.weekSize = val;
      if(state.thisWeek.length > val) state.thisWeek = state.thisWeek.slice(0, val);
      await saveMeta(); renderWeek(body);
    });
    document.getElementById('dd-clear-week').addEventListener('click', async () => {
      if(confirm(`Clear all ${state.weekSize} slots — this also empties the grocery list, including anything you added manually. Continue?`)){
        state.thisWeek = [];
        state.extraGrocery = [];
        state.checkedGrocery = {};
        await saveMeta(); renderWeek(body);
      }
    });
    const inlineWrap = document.getElementById('dd-inline-recipes');
    if(inlineWrap) renderRecipes(inlineWrap);
  }

  function openGuidedModal(weekBody){
    const back = document.createElement('div');
    back.className = 'dd-modal-back';
    back.innerHTML = `
      <div class="dd-modal">
        <button class="dd-close">&times;</button>
        <h2>Guided suggestions</h2>
        <div class="dd-help" style="margin-bottom:14px;">Set how many of each protein you want (up to ${state.weekSize} total meal-slots — leftover recipes use 2). Leave any at 0 to skip.</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">
          ${PROTEINS.map(p => `<div class="dd-field" style="margin-bottom:0;"><label>${esc(p)}</label><input type="number" min="0" max="${state.weekSize}" value="0" data-protein="${esc(p)}"/></div>`).join('')}
        </div>
        <div class="dd-field">
          <label>Max total time per recipe</label>
          <select id="g-time">
            <option value="">No limit</option>
            <option value="20">Under 20 min</option>
            <option value="40">Under 40 min</option>
            <option value="60">Under 60 min</option>
          </select>
        </div>
        <div class="dd-field">
          <label>How many recipes with leftovers?</label>
          <input type="number" id="g-leftovers" min="0" max="${Math.floor(state.weekSize/2)}" value="1"/>
          <div class="dd-help" style="margin-top:4px;">Each one fills 2 of your ${state.weekSize} slots. Set to 0 for none, or higher if you want more leftover nights this week.</div>
        </div>
        <div class="dd-modal-actions">
          <button class="dd-btn secondary" id="g-cancel">Cancel</button>
          <button class="dd-btn" id="g-generate">Generate</button>
        </div>
      </div>
    `;
    document.body.appendChild(back);
    back.querySelector('.dd-close').addEventListener('click', () => back.remove());
    back.querySelector('#g-cancel').addEventListener('click', () => back.remove());
    back.addEventListener('click', e => { if(e.target === back) back.remove(); });
    back.querySelector('#g-generate').addEventListener('click', async () => {
      const proteinCounts = {}; let total = 0;
      back.querySelectorAll('[data-protein]').forEach(el => { const v = parseInt(el.value)||0; if(v>0){ proteinCounts[el.dataset.protein]=v; total+=v; } });
      if(total > state.weekSize){ alert(`That adds up to more than ${state.weekSize} meal-slots. Lower a few counts.`); return; }
      const maxTimeVal = back.querySelector('#g-time').value;
      const maxLeftovers = parseInt(back.querySelector('#g-leftovers').value);
      const result = guidedSuggestWeek(proteinCounts, maxTimeVal ? +maxTimeVal : null, isNaN(maxLeftovers) ? 1 : maxLeftovers);
      state.thisWeek = result.picked;
      await saveMeta(); back.remove(); renderWeek(weekBody);
      if(result.shortfalls.length){ alert("Couldn't fully fill your request: " + result.shortfalls.map(s => `${s.protein} — wanted ${s.count}, only found ${s.found}`).join('; ')); }
    });
  }

  function openFillPicker(slotIdx, weekBody){
    const back = document.createElement('div');
    back.className = 'dd-modal-back';
    const options = state.recipes.filter(r => !state.thisWeek.includes(r.id));
    back.innerHTML = `
      <div class="dd-modal">
        <button class="dd-close">&times;</button>
        <h2>Add a recipe to this slot</h2>
        <div class="dd-grid">
          ${options.map(r => `<div class="dd-card" data-id="${r.id}" style="cursor:pointer;"><h3>${esc(r.name)}</h3><div class="meta">${r.bucket==='tryList'?'<span class="dd-tag dd-badge-try">Want to try</span>':''}<span class="dd-tag">${esc(r.protein)}</span>${r.makesLeftovers?'<span class="dd-tag dd-badge-leftover">leftovers · 2 meals</span>':''}</div></div>`).join('') || `<div class="dd-empty"><div class="display">Nothing left to add</div>Every recipe is already planned this week.</div>`}
        </div>
      </div>
    `;
    document.body.appendChild(back);
    back.querySelector('.dd-close').addEventListener('click', () => back.remove());
    back.addEventListener('click', e => { if(e.target === back) back.remove(); });
    back.querySelectorAll('.dd-card').forEach(el => el.addEventListener('click', async () => {
      const newId = el.dataset.id;
      const newRecipe = getRecipe(newId);
      while(state.thisWeek.length <= slotIdx) state.thisWeek.push(null);
      if(newRecipe && newRecipe.makesLeftovers){
        const free = state.weekSize - state.thisWeek.filter(Boolean).length;
        if(free < 2){ alert(`"${newRecipe.name}" needs 2 open slots. Not enough room.`); return; }
        state.thisWeek[slotIdx] = newId;
        const nextEmpty = state.thisWeek.findIndex((v,i) => i>slotIdx && !v);
        if(nextEmpty>-1) state.thisWeek[nextEmpty] = newId; else state.thisWeek.push(newId);
      } else {
        state.thisWeek[slotIdx] = newId;
      }
      await saveMeta();
      back.remove();
      renderWeek(weekBody);
    }));
  }

  function openSwapPicker(slotIdx, weekBody){
    const currentId = state.thisWeek[slotIdx];
    const back = document.createElement('div');
    back.className = 'dd-modal-back';
    const options = state.recipes.filter(r => !state.thisWeek.includes(r.id) || r.id === currentId);
    back.innerHTML = `
      <div class="dd-modal">
        <button class="dd-close">&times;</button>
        <h2>Swap in a different recipe</h2>
        <div class="dd-grid">
          ${options.map(r => `<div class="dd-card" data-id="${r.id}" style="cursor:pointer;"><h3>${esc(r.name)}</h3><div class="meta">${r.bucket==='tryList'?'<span class="dd-tag dd-badge-try">Want to try</span>':''}<span class="dd-tag">${esc(r.protein)}</span>${r.makesLeftovers?'<span class="dd-tag dd-badge-leftover">leftovers · 2 meals</span>':''}</div></div>`).join('')}
        </div>
      </div>
    `;
    document.body.appendChild(back);
    back.querySelector('.dd-close').addEventListener('click', () => back.remove());
    back.addEventListener('click', e => { if(e.target === back) back.remove(); });
    back.querySelectorAll('.dd-card').forEach(el => el.addEventListener('click', async () => {
      const newId = el.dataset.id;
      const newRecipe = getRecipe(newId);
      const oldRecipe = getRecipe(currentId);
      if(oldRecipe && oldRecipe.makesLeftovers){ state.thisWeek = state.thisWeek.filter(x => x !== currentId); }
      else { state.thisWeek.splice(slotIdx, 1); }
      if(newRecipe && newRecipe.makesLeftovers){
        const free = state.weekSize - state.thisWeek.length;
        if(free < 2){ alert(`"${newRecipe.name}" needs 2 open slots. Not enough room.`); return; }
        state.thisWeek.push(newId); state.thisWeek.push(newId);
      } else {
        state.thisWeek.splice(Math.min(slotIdx, state.thisWeek.length), 0, newId);
      }
      await saveMeta();
      back.remove();
      renderWeek(weekBody);
    }));
  }

  function buildGroceryList(){
    const groups = {};
    uniqueWeekIds().forEach(id => {
      const r = getRecipe(id);
      if(!r) return;
      (r.ingredients||[]).forEach(ing => {
        if(!ing || !ing.name) return;
        const cat = ing.category || 'Other';
        groups[cat] = groups[cat] || {};
        const key = ing.name + '|' + ing.unit;
        if(!groups[cat][key]) groups[cat][key] = {name:ing.name, unit:ing.unit, amount:0, from:[]};
        groups[cat][key].amount += parseFraction(ing.amount);
        groups[cat][key].from.push(r.name);
      });
    });
    return groups;
  }

  function renderGrocery(body){
    if(state.thisWeek.length === 0 && state.extraGrocery.length === 0){
      body.innerHTML = `<div class="dd-empty"><div class="display">No recipes planned yet</div>Head to the This Week tab and add recipes to generate your list, or use Shopping Mode to add items directly.</div>`;
      return;
    }
    const groups = buildGroceryList();
    const catOrder = CATS.filter(c => groups[c]);
    const missing = uniqueWeekIds().map(id=>getRecipe(id)).filter(r => r && (!r.ingredients || r.ingredients.length===0));
    body.innerHTML = `
      <div class="dd-toolbar">
        <span class="dd-help">Combined from: ${uniqueWeekIds().map(id=>esc(getRecipe(id)?.name||'')).join(', ') || 'nothing planned yet'}</span>
        <div style="flex:1;"></div>
        <button class="dd-btn secondary" id="dd-copy">Copy as text</button>
        <button class="dd-btn secondary" id="dd-reset-check">Uncheck all</button>
      </div>
      ${missing.length ? `<div class="dd-warn-banner">${missing.map(r=>esc(r.name)).join(', ')} ${missing.length>1?"don't":"doesn't"} have ingredients entered yet.</div>` : ''}
      ${catOrder.map(cat => `
        <div class="dd-glist-cat">
          <h3>${esc(cat)}</h3>
          ${Object.values(groups[cat]).map(item => {
            const key = cat+'|'+item.name+'|'+item.unit;
            const checked = !!state.checkedGrocery[key];
            const displayAmt = formatAmount(item.amount);
            const amtDisplay = item.unit==='count' ? `${displayAmt}` : `${displayAmt} ${item.unit}`;
            return `
            <div class="dd-glist-item ${checked?'checked':''}">
              <div class="dd-glist-check ${checked?'on':''}" data-key="${esc(key)}">${checked?'✓':''}</div>
              <div><span class="amt">${esc(amtDisplay)}</span>${esc(item.name)}<span class="from">${item.from.length>1?'used in '+item.from.map(esc).join(' & '):'for '+esc(item.from[0])}</span></div>
            </div>
          `}).join('')}
        </div>
      `).join('')}
      ${state.extraGrocery.length ? `
        <div class="dd-glist-cat">
          <h3>Other items</h3>
          ${state.extraGrocery.map(item => `
            <div class="dd-glist-item ${item.checked?'checked':''}">
              <div class="dd-glist-check ${item.checked?'on':''}" data-extra="${esc(item.id)}">${item.checked?'✓':''}</div>
              <div>${esc(item.name)}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;
    body.querySelectorAll('.dd-glist-check[data-key]').forEach(el => el.addEventListener('click', async () => {
      const key = el.dataset.key; state.checkedGrocery[key] = !state.checkedGrocery[key]; await saveMeta(); renderGrocery(body);
    }));
    body.querySelectorAll('.dd-glist-check[data-extra]').forEach(el => el.addEventListener('click', async () => {
      const item = state.extraGrocery.find(x => x.id === el.dataset.extra);
      if(item){ item.checked = !item.checked; await saveMeta(); renderGrocery(body); }
    }));
    document.getElementById('dd-reset-check').addEventListener('click', async () => { state.checkedGrocery = {}; await saveMeta(); renderGrocery(body); });
    document.getElementById('dd-copy').addEventListener('click', () => {
      let text = "Grocery List — " + uniqueWeekIds().map(id=>getRecipe(id)?.name).join(', ') + "\n\n";
      catOrder.forEach(cat => {
        text += cat.toUpperCase() + "\n";
        Object.values(groups[cat]).forEach(item => {
          const displayAmt = formatAmount(item.amount);
          const amtDisplay = item.unit==='count' ? `${displayAmt}` : `${displayAmt} ${item.unit}`;
          text += `- ${amtDisplay} ${item.name}\n`;
        });
        text += "\n";
      });
      if(state.extraGrocery.length){ text += "OTHER ITEMS\n"; state.extraGrocery.forEach(i => text += `- ${i.name}\n`); }
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('dd-copy'); const orig = btn.textContent;
        btn.textContent = 'Copied!'; setTimeout(()=>{btn.textContent=orig;}, 1500);
      }).catch(()=> alert('Could not copy — your browser may be blocking clipboard access.'));
    });
  }

  function renderShoppingMode(root){
    const groups = buildGroceryList();
    let rows = [];
    Object.entries(groups).forEach(([cat, items]) => {
      Object.values(items).forEach(item => {
        const key = cat+'|'+item.name+'|'+item.unit;
        const displayAmt = formatAmount(item.amount);
        const amtDisplay = item.unit==='count' ? displayAmt : `${displayAmt} ${item.unit}`;
        const qtyPart = amtDisplay.trim();
        const label = qtyPart ? `${item.name} (${qtyPart})` : item.name;
        rows.push({ type:'recipe', key, label, sortName: item.name, from: item.from.join(' & '), checked: !!state.checkedGrocery[key] });
      });
    });
    state.extraGrocery.forEach(item => { rows.push({ type:'extra', key:item.id, label:item.name, sortName:item.name, from:'', checked:!!item.checked }); });
    rows.sort((a,b) => {
      if(a.checked !== b.checked) return a.checked ? 1 : -1;
      return a.sortName.toLowerCase().localeCompare(b.sortName.toLowerCase());
    });
    root.innerHTML = `
      <div class="shop-header">
        <h1>🛒 Shopping Mode</h1>
        <button class="dd-btn secondary" id="shop-exit">Exit</button>
      </div>
      <div class="shop-add-row">
        <input type="text" id="shop-add-input" placeholder="Add an item not tied to a recipe…"/>
        <button class="dd-btn" id="shop-add-btn">Add</button>
      </div>
      <div class="shop-list" id="shop-list">
        ${rows.length ? rows.map(r => `
          <div class="shop-row ${r.checked?'checked':''}" data-type="${r.type}" data-key="${esc(r.key)}">
            <div class="shop-box">${r.checked?'✓':''}</div>
            <div>${esc(r.label)}</div>
            ${r.from?`<div class="shop-from">${esc(r.from)}</div>`:''}
          </div>
        `).join('') : `<div class="dd-empty"><div class="display">Nothing on the list yet</div>Plan some recipes for this week, or add items above.</div>`}
      </div>
    `;
    document.getElementById('shop-exit').addEventListener('click', () => { state.mode='app'; render(); });
    document.getElementById('shop-add-btn').addEventListener('click', () => {
      const input = document.getElementById('shop-add-input');
      const val = input.value.trim();
      if(!val) return;
      state.extraGrocery.push({ id: 'x'+Math.random().toString(36).slice(2,9), name: val, checked:false });
      input.value = '';
      renderShoppingMode(root);
      saveMeta();
    });
    document.getElementById('shop-add-input').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('shop-add-btn').click(); });
    root.querySelectorAll('.shop-row').forEach(el => el.addEventListener('click', () => {
      if(el.dataset.type === 'extra'){
        const item = state.extraGrocery.find(x => x.id === el.dataset.key);
        if(item) item.checked = !item.checked;
      } else {
        state.checkedGrocery[el.dataset.key] = !state.checkedGrocery[el.dataset.key];
      }
      renderShoppingMode(root);
      saveMeta();
    }));
  }

  loadState();
})();
</script>
</body>
</html>
