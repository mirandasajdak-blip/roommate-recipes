<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roommate Recipes</title>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --line: #30363d;
      --ink: #c9d1d9;
      --ink-soft: #8b949e;
      --mustard: #d4a373;
      --danger: #f85149;
      --primary: #238636;
      --primary-hover: #2ea043;
    }
    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.5;
    }
    #dd-root {
      max-width: 1000px;
      margin: 0 auto;
    }
    .dd-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .dd-header h1 {
      margin: 0 0 4px 0;
      font-size: 24px;
    }
    .dd-header .sub {
      color: var(--ink-soft);
      font-size: 14px;
    }
    .dd-tabs {
      display: flex;
      gap: 8px;
    }
    .dd-tab {
      padding: 8px 16px;
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .dd-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .dd-shared-note {
      font-size: 12px;
      color: var(--ink-soft);
      flex: 1;
      min-width: 250px;
    }
    .dd-toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .dd-search {
      flex: 1;
      min-width: 200px;
      background: var(--card-bg);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
    }
    .dd-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .dd-btn:hover {
      background: var(--primary-hover);
    }
    .dd-btn.secondary {
      background: var(--card-bg);
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .dd-btn.secondary:hover {
      background: #21262d;
    }
    .dd-btn.danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .dd-btn.danger:hover {
      background: rgba(248, 81, 73, 0.1);
    }
    .dd-chip {
      background: var(--card-bg);
      border: 1px solid var(--line);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
    }
    .dd-chip.on {
      background: var(--mustard);
      border-color: var(--mustard);
      color: black;
      font-weight: 600;
    }
    .dd-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .dd-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      position: relative;
      cursor: pointer;
    }
    .dd-card h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
      padding-right: 30px;
    }
    .dd-check {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 22px;
      height: 22px;
      border: 1px solid var(--line);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
    }
    .dd-check.on {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--ink-soft);
      margin-bottom: 12px;
    }
    .dd-tag {
      background: #21262d;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .dd-badge-try {
      background: rgba(212, 163, 115, 0.15);
      color: var(--mustard);
    }
    .dd-badge-warn {
      background: rgba(248, 81, 73, 0.15);
      color: var(--danger);
    }
    .ingr-preview {
      font-size: 13px;
      color: var(--ink-soft);
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .dd-empty {
      text-align: center;
      padding: 40px;
      color: var(--ink-soft);
      border: 1px dashed var(--line);
      border-radius: 8px;
      grid-column: 1 / -1;
    }
    .dd-empty .display {
      font-size: 18px;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .dd-modal-back {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .dd-modal {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
    }
    .dd-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--ink-soft);
      font-size: 24px;
      cursor: pointer;
    }
    .dd-field {
      margin-bottom: 16px;
    }
    .dd-field label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .dd-field input, .dd-field select, .dd-field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .dd-row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .dd-ingr-row {
      display: grid;
      grid-template-columns: 60px 100px 1fr 120px 40px;
      gap: 8px;
      margin-bottom: 8px;
    }
    .dd-ingr-row input, .dd-ingr-row select {
      background: var(--bg);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 4px 8px;
      border-radius: 6px;
    }
    .dd-modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }
    .dd-help {
      font-size: 12px;
      color: var(--ink-soft);
    }
    .dd-week-slots {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .dd-slot {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
    }
    .dd-slot.filled {
      border-left: 4px solid var(--mustard);
    }
    .dd-slot .num {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    .dd-slot h4 {
      margin: 0 0 6px 0;
      font-size: 16px;
    }
    .dd-slot .empty-msg {
      color: var(--ink-soft);
      font-size: 13px;
      margin: auto 0;
    }
    .dd-slot-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 12px;
    }
    .dd-slot-actions .dd-btn {
      padding: 4px 8px;
      font-size: 11px;
      flex: 1;
    }
    .dd-shared-panel {
      background: rgba(214, 163, 115, 0.05);
      border: 1px solid rgba(214, 163, 115, 0.2);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .dd-shared-panel h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }
    .dd-shared-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .dd-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dd-shared-none {
      color: var(--ink-soft);
      font-size: 13px;
    }
    .dd-glist-cat {
      margin-bottom: 24px;
    }
    .dd-glist-cat h3 {
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
      margin-bottom: 12px;
      font-size: 16px;
    }
    .dd-glist-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 0;
      font-size: 14px;
    }
    .dd-glist-item.checked {
      color: var(--ink-soft);
      text-decoration: line-through;
    }
    .dd-glist-check {
      width: 18px;
      height: 18px;
      border: 1px solid var(--line);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 10px;
    }
    .dd-glist-check.on {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .dd-glist-item .amt {
      font-weight: 600;
      margin-right: 6px;
    }
    .dd-glist-item .from {
      font-size: 12px;
      color: var(--ink-soft);
      margin-left: 8px;
    }
    .dd-warn-banner {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.2);
      color: #ff7b72;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .dd-select-inline {
      background: var(--card-bg);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="dd-root"></div>

  <script>
  (function(){
    const CATS = ["Produce","Meat","Dairy & Eggs","Grains & Bread","Pantry & Canned","Spices & Condiments","Frozen","Other"];
    const PROTEINS = ["Chicken","Beef","Pork","Turkey","Vegetarian","Other"];
    const UNITS = ["lb","oz","g","kg","cup","tbsp","tsp","count","can","jar","package","other"];
    const TRY_CHANCE_OPTIONS = [
      {value:0, label:"Stick to the rotation"},
      {value:0.3, label:"Sometimes surprise us"},
      {value:0.6, label:"Lean into trying new things"}
    ];

    let state = {
      recipes: [],
      thisWeek: [], // array of recipe ids
      tab: 'recipes',
      search: '',
      proteinFilter: null,
      bucketFilter: null, // 'rotation' | 'tryList' | null (all)
      checkedGrocery: {}, // key -> bool
      tryChance: 0.3,
      weekSize: 5,
      loadError: false,
      loaded: false
    };

    const SEED = [
      // ---- Pasta ----
      {name:"Red Sauce", protein:"Vegetarian", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Pasta e Fagioli", protein:"Vegetarian", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Fettuccine Alfredo", protein:"Vegetarian", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Fresh Pesto Pasta", protein:"Vegetarian", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Mac and Cheese", protein:"Vegetarian", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Cacio e Pepe", protein:"Vegetarian", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Lasagna", protein:"Beef", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Baked Ziti", protein:"Beef", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Italian Sausage Pasta", protein:"Pork", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Spaghetti and Meatballs", protein:"Beef", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Stanley Tucci Pasta", protein:"Vegetarian", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      // ---- Mexican ----
      {name:"Chicken Tacos", protein:"Chicken", cuisine:"Mexican", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Pork Tacos", protein:"Pork", cuisine:"Mexican", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Enchiladas", protein:"Chicken", cuisine:"Mexican", servings:6, bucket:"rotation", ingredients:[], notes:""},
      // ---- Curry ----
      {name:"Chicken Tikka Masala", protein:"Chicken", cuisine:"Indian", servings:3, bucket:"rotation", ingredients:[], notes:""},
      // ---- Comfort Food ----
      {name:"Beef Stew", protein:"Beef", cuisine:"American", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Chili", protein:"Beef", cuisine:"American", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Swedish Meatballs", protein:"Beef", cuisine:"Swedish", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Pork Tenderloin with Potatoes & Veggie", protein:"Pork", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Meatloaf", protein:"Beef", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Chicken Parmesan", protein:"Chicken", cuisine:"Italian", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Pizza Night", protein:"Other", cuisine:"Italian", servings:3, bucket:"rotation", ingredients:[], notes:"Always exactly 3 — no leftovers."},
      {name:"Chicken Pot Pie", protein:"Chicken", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Chicken Cacciatore", protein:"Chicken", cuisine:"Italian", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Chicken and Dumplings", protein:"Chicken", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Chicken Piccata", protein:"Chicken", cuisine:"Italian", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Chicken Marsala", protein:"Chicken", cuisine:"Italian", servings:3, bucket:"rotation", ingredients:[], notes:""},
      // ---- Rice / Bowls ----
      {name:"Chicken Paprikash", protein:"Chicken", cuisine:"Hungarian", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Goulash", protein:"Beef", cuisine:"Hungarian", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Honey Sriracha Chicken", protein:"Chicken", cuisine:"Asian-inspired", servings:3, bucket:"rotation", ingredients:[], notes:"Always exactly 3 — no leftovers."},
      // ---- Sandwiches & Grill ----
      {name:"Pulled Pork Sandwiches", protein:"Pork", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Italian Sausage Sandwiches", protein:"Pork", cuisine:"Italian", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Sloppy Joes", protein:"Beef", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Grilled Cheese & Tomato Soup", protein:"Vegetarian", cuisine:"American", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Hot Dogs", protein:"Other", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Hamburgers", protein:"Beef", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Chicken (Grilled) w/ Various Seasonings", protein:"Chicken", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Bratwurst and Sauerkraut", protein:"Pork", cuisine:"German", servings:3, bucket:"rotation", ingredients:[], notes:""},
      {name:"Gyros", protein:"Other", cuisine:"Greek", servings:3, bucket:"rotation", ingredients:[], notes:""},
      // ---- Soup Night ----
      {name:"Minestrone Soup", protein:"Vegetarian", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Escarole Soup", protein:"Vegetarian", cuisine:"Italian", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"Chicken Noodle Soup", protein:"Chicken", cuisine:"American", servings:6, bucket:"rotation", ingredients:[], notes:""},
      {name:"French Onion Soup", protein:"Vegetarian", cuisine:"French", servings:6, bucket:"rotation", ingredients:[], notes:""},
      // ---- Lighter Nights ----
      {name:"Salad Night", protein:"Vegetarian", cuisine:"American", servings:3, bucket:"rotation", ingredients:[], notes:""},
      // ---- Want to Try ----
      {name:"Chicken Teriyaki Bowls", protein:"Chicken", cuisine:"Japanese", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Korean-Inspired Beef Bowls", protein:"Beef", cuisine:"Korean", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Meatball Subs", protein:"Beef", cuisine:"Italian", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Cuban Mojo Pork", protein:"Pork", cuisine:"Cuban", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Thai Curry (Red or Green)", protein:"Chicken", cuisine:"Thai", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Coq au Vin", protein:"Chicken", cuisine:"French", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Beef Bourguignon", protein:"Beef", cuisine:"French", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Picadillo", protein:"Beef", cuisine:"Cuban", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Butter Chicken", protein:"Chicken", cuisine:"Indian", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"French Dip Sandwiches", protein:"Beef", cuisine:"American", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Calzones", protein:"Other", cuisine:"Italian", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Chicken Cordon Bleu", protein:"Chicken", cuisine:"French", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""},
      {name:"Cottage Pie (Shepherd's Pie with Beef)", protein:"Beef", cuisine:"British", servings:3, bucket:"tryList", surpriseEligible:false, ingredients:[], notes:""}
    ];

    function uid(){ return 'r' + Math.random().toString(36).slice(2,10); }

    function freshSeed(){
      return SEED.map(r => ({
        ...r,
        id: uid(),
        bucket: r.bucket || 'rotation',
        surpriseEligible: r.surpriseEligible !== undefined ? r.surpriseEligible : true,
        timeMinutes: r.timeMinutes || null
      }));
    }

    const localDb = {
      get(key) {
        try {
          const val = localStorage.getItem(key);
          return val ? { value: val } : null;
        } catch(e) {
          console.error("Local storage read failed", e);
          return null;
        }
      },
      set(key, val) {
        try {
          localStorage.setItem(key, val);
        } catch(e) {
          console.error("Local storage write failed", e);
        }
      }
    };

    async function loadState(){
      state.loadError = false;
      
      let hashData = null;
      if (window.location.hash) {
        try {
          const parsed = JSON.parse(decodeURIComponent(window.location.hash.slice(1)));
          if (parsed && Array.isArray(parsed.recipes)) {
            hashData = parsed;
          }
        } catch(e) {
          console.error("Failed to parse URL hash data", e);
        }
      }

      if (hashData) {
        if (confirm("You are opening a shared recipe list. Do you want to import these recipes? (This will update your dashboard with the shared list)")) {
          state.recipes = hashData.recipes;
          state.thisWeek = hashData.thisWeek || [];
          state.checkedGrocery = hashData.checkedGrocery || {};
          state.tryChance = hashData.tryChance !== undefined ? hashData.tryChance : 0.3;
          state.weekSize = hashData.weekSize || 5;
          
          await saveRecipes(); await saveWeek(); await saveChecked(); await saveTryChance(); await saveWeekSize();
          history.replaceState("", document.title, window.location.pathname + window.location.search);
          state.loaded = true;
          render();
          return;
        }
      }

      let recipesRaw = null;
      try {
        const r = localDb.get('recipes');
        recipesRaw = r ? r.value : null;
      } catch(e) {
        state.loadError = true;
      }

      if (recipesRaw) {
        try {
          state.recipes = JSON.parse(recipesRaw);
        } catch(e) {
          state.loadError = true;
        }
      } else {
        state.recipes = freshSeed();
        localDb.set('recipes', JSON.stringify(state.recipes));
      }

      try {
        const w = localDb.get('thisWeek');
        if(w && w.value) state.thisWeek = JSON.parse(w.value);
      } catch(e) { state.thisWeek = []; }

      try {
        const c = localDb.get('checkedGrocery');
        if(c && c.value) state.checkedGrocery = JSON.parse(c.value);
      } catch(e) { state.checkedGrocery = {}; }

      try {
        const t = localDb.get('tryChance');
        if(t && t.value) state.tryChance = JSON.parse(t.value);
      } catch(e) { }

      try {
        const ws = localDb.get('weekSize');
        if(ws && ws.value) state.weekSize = JSON.parse(ws.value);
      } catch(e) { }

      state.loaded = true;
      render();
    }

    async function saveRecipes(){
      localDb.set('recipes', JSON.stringify(state.recipes));
    }
    async function saveWeek(){
      localDb.set('thisWeek', JSON.stringify(state.thisWeek));
    }
    async function saveChecked(){
      localDb.set('checkedGrocery', JSON.stringify(state.checkedGrocery));
    }
    async function saveTryChance(){
      localDb.set('tryChance', JSON.stringify(state.tryChance));
    }
    async function saveWeekSize(){
      localDb.set('weekSize', JSON.stringify(state.weekSize));
    }

    function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function getRecipe(id){ return state.recipes.find(r => r.id === id); }

    function filteredRecipes(){
      let list = state.recipes;
      if(state.bucketFilter){ list = list.filter(r => (r.bucket||'rotation') === state.bucketFilter); }
      if(state.proteinFilter){ list = list.filter(r => r.protein === state.proteinFilter); }
      if(state.search.trim()){
        const q = state.search.trim().toLowerCase();
        list = list.filter(r =>
          r.name.toLowerCase().includes(q) ||
          (r.cuisine||'').toLowerCase().includes(q) ||
          r.ingredients.some(i => i.name.toLowerCase().includes(q))
        );
      }
      return list.slice().sort((a,b)=>a.name.localeCompare(b.name));
    }

    function render(){
      const root = document.getElementById('dd-root');
      if(!state.loaded){ root.innerHTML = '<div class="dd-empty">Loading your recipe box…</div>'; return; }
      if(state.loadError){
        root.innerHTML = `
          <div class="dd-header"><div><h1>Dinner Rotation</h1></div></div>

    function renderRecipes(body){
      const list = filteredRecipes();
      body.innerHTML = `
        <div class="dd-toolbar">
          <input class="dd-search" id="dd-search-input" placeholder="Search by name, ingredient, or cuisine…" value="${esc(state.search)}"/>

          tryChance: state.tryChance,

        };

        const url = URL.createObjectURL(blob);

        a.href = url;
        a.download = `dinner-dashboard-backup-${new Date().toISOString().slice(0,10)}.json`;

        reader.onload = async (ev) => {
          try{
            const backup = JSON.parse(ev.target.result);

          alert(`You've already got ${state.weekSize} recipe${state.weekSize===1?'':'s'} planned for this week. Remove one first, or adjust the week size in the This Week tab.`);
          return;
        }
        state.thisWeek.push(id);
      }
      saveWeek();

    function findSharedIngredients(recipeIds){
      const map = {}; 
      recipeIds.forEach(id => {
        const r = getRecipe(id);
        if(!r) return;
        r.ingredients.forEach(ing => {
          const name = ing.name.toLowerCase();
          if(!map[name]) map[name] = [];
          map[name].push({recipeId: id, recipeName: r.name, amount: ing.amount, unit: ing.unit});
        });
      });
      const shared = Object.entries(map).filter(([name, uses]) => {
        const distinctRecipes = new Set(uses.map(u=>u.recipeId));
        return distinctRecipes.size > 1;
      });
      return shared;
    }

    function suggestWeek(){
      const pool = state.recipes.filter(r => (r.bucket||'rotation') === 'rotation');
      const tryPool = state.recipes.filter(r => r.bucket === 'tryList' && r.surpriseEligible !== false);
      if(pool.length === 0 && tryPool.length === 0) return [];
      const ingrMap = {};
      pool.forEach(r => r.ingredients.forEach(i => {
        if(i.category === 'Meat'){
          ingrMap[i.name] = ingrMap[i.name] || new Set();
          ingrMap[i.name].add(r.id);
        }
      }));
      let pairIds = null;
      const candidates = Object.entries(ingrMap).filter(([name, set]) => set.size > 1);
      if(candidates.length){
        const [name, set] = candidates[Math.floor(Math.random()*candidates.length)];
        pairIds = Array.from(set).slice(0,2);
      }
      let picked = [];
      if(pairIds) picked = pairIds.slice();
      const shuffled = pool.slice().sort(()=>Math.random()-0.5);
      const usedProteins = {};
      picked.forEach(id => { const r = getRecipe(id); if(r) usedProteins[r.protein] = (usedProteins[r.protein]||0)+1; });
      for(const r of shuffled){
        if(picked.length >= state.weekSize) break;
        if(picked.includes(r.id)) continue;
        const count = usedProteins[r.protein] || 0;
        if(count >= 2) continue; 
        picked.push(r.id);
        usedProteins[r.protein] = count + 1;
      }
      for(const r of shuffled){
        if(picked.length >= state.weekSize) break;
        if(!picked.includes(r.id)) picked.push(r.id);
      }
      picked = picked.slice(0, state.weekSize);

      if(tryPool.length && Math.random() < state.tryChance && picked.length > 0){
        const pickIdx = Math.floor(Math.random()*picked.length);
        const tryPick = tryPool[Math.floor(Math.random()*tryPool.length)];
        picked[pickIdx] = tryPick.id;
      }
      return picked;
    }

    function guidedSuggestWeek(proteinCounts, maxTime){
      const pool = state.recipes.filter(r => {
        const bucketOk = (r.bucket||'rotation') === 'rotation' || (r.bucket === 'tryList' && r.surpriseEligible !== false);
        if(!bucketOk) return false;
        if(maxTime && (!r.timeMinutes || r.timeMinutes > maxTime)) return false;
        return true;
      });
      let picked = [];
      const usedIds = new Set();
      const shortfalls = [];
      Object.entries(proteinCounts).forEach(([protein, count]) => {
        if(!count) return;
        const options = pool.filter(r => r.protein === protein && !usedIds.has(r.id)).sort(()=>Math.random()-0.5);
        const take = options.slice(0, count);
        take.forEach(r => { picked.push(r.id); usedIds.add(r.id); });
        if(take.length < count) shortfalls.push({protein, count, found: take.length});
      });
      const remaining = pool.filter(r => !usedIds.has(r.id)).sort(()=>Math.random()-0.5);
      for(const r of remaining){
        if(picked.length >= state.weekSize) break;
        picked.push(r.id); usedIds.add(r.id);
      }
      return { picked: picked.slice(0, state.weekSize), shortfalls };
    }

    function renderWeek(body){
      const shared = findSharedIngredients(state.thisWeek);
      const colors = ['#5C7A5C','#C98A2E','#B5533C','#3F5A3F','#8A6D3B'];

        const isTry = r.bucket === 'tryList';

        return `

            <div class="num">Slot ${i+1} · ${esc(r.protein)}${isTry?' · <span style="color:var(--mustard);">want to try</span>':''}</div>

            <div class="meta">${r.cuisine?esc(r.cuisine)+' · ':''}${r.servings||'–'} servings${noIngr?' · <span style="color:var(--danger);">needs ingredients</span>':''}</div>
            <div class="dd-slot-actions">
              <button class="dd-btn secondary" data-swap="${id}">Swap</button>
              <button class="dd-btn secondary" data-remove="${id}">Remove</button>
            </div>
          </div>
        `;
      }).join('');
      slotsEl.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
        state.thisWeek = state.thisWeek.filter(x=>x!==el.dataset.remove);
        saveWeek(); renderWeek(body);
      }));
      slotsEl.querySelectorAll('[data-swap]').forEach(el => el.addEventListener('click', () => {
        const currentId = el.dataset.swap;
        openSwapPicker(currentId, body);
      }));
      document.getElementById('dd-suggest').addEventListener('click', () => {
        state.thisWeek = suggestWeek();
        saveWeek(); renderWeek(body);
      });
      document.getElementById('dd-guided').addEventListener('click', () => {
        openGuidedModal(body);
      });
      document.getElementById('dd-try-chance').addEventListener('change', (e) => {
        state.tryChance = parseFloat(e.target.value);
        saveTryChance();
      });
      document.getElementById('dd-week-size').addEventListener('change', (e) => {
        let val = parseInt(e.target.value) || 5;
        val = Math.max(1, Math.min(10, val));
        e.target.value = val;
        state.weekSize = val;
        if(state.thisWeek.length > val){
          state.thisWeek = state.thisWeek.slice(0, val);
          saveWeek();
        }
        saveWeekSize();
        renderWeek(body);
      });
      document.getElementById('dd-clear-week').addEventListener('click', () => {
        if(confirm(`Clear all ${state.weekSize} slots for this week?`)){
          state.thisWeek = []; saveWeek(); renderWeek(body);
        }
      });
    }

    function openGuidedModal(weekBody){
      const back = document.createElement('div');
      back.className = 'dd-modal-back';
      back.innerHTML = `
        <div class="dd-modal">
          <button class="dd-close">&times;</button>
          <h2>Guided suggestions</h2>
          <div class="dd-help" style="margin-bottom:14px;">Set how many of each protein you want (up to ${state.weekSize} total). Leave any at 0 to skip — remaining slots fill in on their own.</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">
            ${PROTEINS.map(p => `
              <div class="dd-field" style="margin-bottom:0;">
                <label>${esc(p)}</label>
                <input type="number" min="0" max="${state.weekSize}" value="0" data-protein="${esc(p)}"/>
              </div>
            `).join('')}
          </div>
          <div class="dd-field">
            <label>Max time per recipe</label>
            <select id="g-time">
              <option value="">No limit</option>
              <option value="20">Under 20 min</option>
              <option value="40">Under 40 min</option>
              <option value="60">Under 60 min</option>
            </select>
          </div>
          <div class="dd-modal-actions">
            <button class="dd-btn secondary" id="g-cancel">Cancel</button>
            <button class="dd-btn" id="g-generate">Generate</button>
          </div>
        </div>
      `;
      document.body.appendChild(back);
      back.querySelector('.dd-close').addEventListener('click', () => back.remove());
      back.querySelector('#g-cancel').addEventListener('click', () => back.remove());
      back.addEventListener('click', (e) => { if(e.target === back) back.remove(); });
      back.querySelector('#g-generate').addEventListener('click', () => {
        const proteinCounts = {};
        let total = 0;
        back.querySelectorAll('[data-protein]').forEach(el => {
          const v = parseInt(el.value) || 0;
          if(v > 0){ proteinCounts[el.dataset.protein] = v; total += v; }
        });
        if(total > state.weekSize){
          alert(`That adds up to more than ${state.weekSize} recipes, and the week only has ${state.weekSize} slots. Lower a few counts and try again.`);
          return;
        }
        const maxTimeVal = back.querySelector('#g-time').value;
        const maxTime = maxTimeVal ? +maxTimeVal : null;
        const result = guidedSuggestWeek(proteinCounts, maxTime);
        state.thisWeek = result.picked;
        saveWeek();
        back.remove();
        renderWeek(weekBody);
        if(result.shortfalls.length){
          alert("Couldn't fully fill your request: " + result.shortfalls.map(s => `${s.protein} — wanted ${s.count}, only found ${s.found} that fit`).join('; '));
        }
      });
    }

    function openSwapPicker(currentId, weekBody){
      const back = document.createElement('div');
      back.className = 'dd-modal-back';
      const options = state.recipes.filter(r => !state.thisWeek.includes(r.id) || r.id === currentId);
      back.innerHTML = `
        <div class="dd-modal">
          <button class="dd-close">&times;</button>
          <h2>Swap in a different recipe</h2>
          <div class="dd-grid">
            ${options.map(r => `<div class="dd-card" data-id="${r.id}" style="cursor:pointer;"><h3>${esc(r.name)}</h3><div class="meta">${r.bucket==='tryList'?'<span class="dd-tag dd-badge-try">Want to try</span>':''}<span class="dd-tag">${esc(r.protein)}</span></div></div>`).join('')}
          </div>
        </div>
      `;
      document.body.appendChild(back);
      back.querySelector('.dd-close').addEventListener('click', () => back.remove());
      back.addEventListener('click', (e) => { if(e.target === back) back.remove(); });
      back.querySelectorAll('.dd-card').forEach(el => el.addEventListener('click', () => {
        const idx = state.thisWeek.indexOf(currentId);
        if(idx > -1) state.thisWeek[idx] = el.dataset.id;
        saveWeek();
        back.remove();
        renderWeek(weekBody);
      }));
    }

    function buildGroceryList(){
      const groups = {}; 
      state.thisWeek.forEach(id => {
        const r = getRecipe(id);
        if(!r) return;
        r.ingredients.forEach(ing => {
          const cat = ing.category || 'Other';
          groups[cat] = groups[cat] || {};
          const key = ing.name + '|' + ing.unit;
          if(!groups[cat][key]) groups[cat][key] = {name: ing.name, unit: ing.unit, amount: 0, from: []};
          groups[cat][key].amount += (ing.amount || 0);
          groups[cat][key].from.push(r.name);
        });
      });
      return groups;
    }

    function renderGrocery(body){
      if(state.thisWeek.length === 0){
        body.innerHTML = `<div class="dd-empty"><div class="display">No recipes planned yet</div>Head to the This Week tab and add recipes to generate your list.</div>`;
        return;
      }
      const groups = buildGroceryList();
      const catOrder = CATS.filter(c => groups[c]);
      const missing = state.thisWeek.map(id=>getRecipe(id)).filter(r => r && r.ingredients.length===0);
      body.innerHTML = `
        <div class="dd-toolbar">
          <span class="dd-help">Combined from: ${state.thisWeek.map(id=>esc(getRecipe(id)?.name||'')).join(', ')}</span>
          <div style="flex:1;"></div>
          <button class="dd-btn secondary" id="dd-copy">Copy as text</button>
          <button class="dd-btn secondary" id="dd-reset-check">Uncheck all</button>
        </div>
        ${missing.length ? `<div class="dd-warn-banner">${missing.map(r=>esc(r.name)).join(', ')} ${missing.length>1?"don't":"doesn't"} have ingredients entered yet, so ${missing.length>1?'they':'it'} won't show up below. Add ingredients from the Recipe Box to include ${missing.length>1?'them':'it'}.</div>` : ''}
        ${catOrder.map(cat => `
          <div class="dd-glist-cat">
            <h3>${esc(cat)}</h3>
            ${Object.values(groups[cat]).map(item => {
              const key = cat+'|'+item.name+'|'+item.unit;
              const checked = !!state.checkedGrocery[key];
              const amtDisplay = item.unit === 'count' ? `${item.amount}` : `${item.amount} ${item.unit}`;
              return `
              <div class="dd-glist-item ${checked?'checked':''}">
                <div class="dd-glist-check ${checked?'on':''}" data-key="${esc(key)}">${checked?'✓':''}</div>
                <div>
                  <span class="amt">${esc(amtDisplay)}</span>${esc(item.name)}
                  <span class="from">${item.from.length>1?'used in '+item.from.map(esc).join(' & '):'for '+esc(item.from[0])}</span>
                </div>
              </div>
            `}).join('')}
          </div>
        `).join('')}
      `;
      body.querySelectorAll('.dd-glist-check').forEach(el => el.addEventListener('click', () => {
        const key = el.dataset.key;
        state.checkedGrocery[key] = !state.checkedGrocery[key];
        saveChecked();
        renderGrocery(body);
      }));
      document.getElementById('dd-reset-check').addEventListener('click', () => {
        state.checkedGrocery = {}; saveChecked(); renderGrocery(body);
      });
      document.getElementById('dd-copy').addEventListener('click', () => {
        let text = "Grocery List — " + state.thisWeek.map(id=>getRecipe(id)?.name).join(', ') + "\n\n";
        catOrder.forEach(cat => {
          text += cat.toUpperCase() + "\n";
          Object.values(groups[cat]).forEach(item => {
            const amtDisplay = item.unit === 'count' ? `${item.amount}` : `${item.amount} ${item.unit}`;
            text += `- ${amtDisplay} ${item.name}\n`;
          });
          text += "\n";
        });
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('dd-copy');
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(()=>{ btn.textContent = orig; }, 1500);
        }).catch(()=> alert('Could not copy — your browser may be blocking clipboard access.'));
      });
    }

    loadState();
  })();
  </script>
</body>
</html>
